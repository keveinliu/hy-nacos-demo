version: "3.8"

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=256m
      - JVM_XMX=256m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-net

  service-c:
    image: nacos-service:0.1
    command: service-c.jar
    container_name: service-c
    environment:
      - ROUTING_UNIT=${ROUTING_UNIT:-unit-1}
      - ROUTING_IDC=${ROUTING_IDC:-idc-1}
      - ROUTING_USER=${ROUTING_USER:-user-1}
      - NACOS_ADDR=nacos:8848
      - HTTP_PORT=8083
      - GRPC_PORT=9093
    ports:
      - "8083:8083"
      - "9093:9093"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - demo-net

  service-b:
    image: nacos-service:0.1
    command: service-b.jar
    container_name: service-b
    environment:
      - ROUTING_UNIT=${ROUTING_UNIT:-unit-1}
      - ROUTING_IDC=${ROUTING_IDC:-idc-1}
      - ROUTING_USER=${ROUTING_USER:-user-1}
      - NACOS_ADDR=nacos:8848
      - HTTP_PORT=8082
      - GRPC_PORT=9092
    ports:
      - "8082:8082"
      - "9092:9092"
    depends_on:
      nacos:
        condition: service_healthy
      service-c:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - demo-net

  service-a:
    image: nacos-service:0.1
    command: service-a.jar
    container_name: service-a
    environment:
      - ROUTING_UNIT=${ROUTING_UNIT:-unit-1}
      - ROUTING_IDC=${ROUTING_IDC:-idc-1}
      - ROUTING_USER=${ROUTING_USER:-user-1}
      - NACOS_ADDR=nacos:8848
      - HTTP_PORT=8081
      - GRPC_PORT=9091
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      nacos:
        condition: service_healthy
      service-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge
