server:
  port: ${HTTP_PORT:8081}

spring:
  application:
    name: service-a

dubbo:
  application:
    name: service-a
    metadataServicePort: ${DUBBO_PORT:20881}
  protocol:
    name: tri
    port: ${DUBBO_PORT:20881}
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
  provider:
    parameters:
      unit: ${ROUTING_UNIT:}
      idc: ${ROUTING_IDC:}
      protocol: grpc
  scan:
    base-packages: com.example.demo.servicea.dubbo
