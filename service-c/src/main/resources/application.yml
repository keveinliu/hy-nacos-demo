server:
  port: ${HTTP_PORT:8083}

spring:
  application:
    name: service-c

logging:
  level:
    org.apache.dubbo: ${LOG_LEVEL:INFO}
    com.example.demo: ${LOG_LEVEL:INFO}

dubbo:
  application:
    name: service-c
    metadataServicePort: ${DUBBO_PORT:20883}
    metadataType: remote
    service-discovery:
      migration: FORCE_APPLICATION
  protocol:
    name: tri
    port: ${DUBBO_PORT:20883}
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
    register-mode: instance
  metadata-report:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
  scan:
    base-packages: com.example.demo.servicec.dubbo
