server:
  port: ${HTTP_PORT:8083}

spring:
  application:
    name: service-c

dubbo:
  application:
    name: service-c
    metadata-type: local
    register-mode: interface
  protocol:
    name: dubbo
    port: ${DUBBO_PORT:20883}
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
    register-mode: interface
    parameters:
      unit: ${ROUTING_UNIT:}
      idc: ${ROUTING_IDC:}
  scan:
    base-packages: com.example.demo.servicec.dubbo
