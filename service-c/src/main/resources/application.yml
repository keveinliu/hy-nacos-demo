      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        metadata:
          unit: ${ROUTING_UNIT:}
          idc: ${ROUTING_IDC:}
    compatibility-verifier:
      enabled: false

grpc:
  server:
    port: ${GRPC_PORT:9093}
