server:
  port: ${HTTP_PORT:8082}

spring:
  application:
    name: service-b

dubbo:
  application:
    name: service-b
    metadataServicePort: ${DUBBO_PORT:20882}
    service-discovery:
      migration: APPLICATION_FIRST
  protocol:
    name: tri
    port: ${DUBBO_PORT:20882}
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
    register-mode: instance
  metadata-report:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
  scan:
    base-packages: com.example.demo.serviceb.dubbo
