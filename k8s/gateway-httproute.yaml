apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: service-a-route
  namespace: demo
spec:
  parentRefs:
  - name: demo-gateway
    namespace: demo
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: service-a
      port: 8081
