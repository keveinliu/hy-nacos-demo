syntax = "proto3";

package com.example.demo.common.api;
option java_package = "com.example.demo.common.proto";
option java_multiple_files = true;

message ServiceRequest {
  string name = 1;
}

message ServiceResponse {
  string message = 1;
  string from_service = 2;
  string trace = 3;
}

service ServiceAApi {
  rpc greeting(ServiceRequest) returns (ServiceResponse);
}

service ServiceBApi {
  rpc process(ServiceRequest) returns (ServiceResponse);
}

service ServiceCApi {
  rpc process(ServiceRequest) returns (ServiceResponse);
}
